[workspace]
members = ["crates/atlas", "crates/atlas-algorithms"]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.85"

[workspace.dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_yaml = { package = "serde_yaml_ng", version = "0.10.0" }
rusqlite = { version = "0.40.1", default-features = false, features = ["libsqlite3-sys"] }
sha2 = "0.11.0"
