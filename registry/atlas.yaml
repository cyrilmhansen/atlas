schema_version: '0.2'
problems:
- id: sequence.sort
  input:
    value: 'sequence: Sequence<T>; order: TotalOrder<T>'
    level: declared
    source: vision:0.1#6
  output:
    value: 'result: PermutationOf<input.sequence>'
    level: declared
    source: vision:0.1#6
  ensures:
    value:
    - sorted(result, order)
    - permutation(result, input.sequence)
    level: tested
    source: test:merge_sort::sorts_and_preserves_the_input_permutation
- id: sequence.search
  input:
    value: 'sequence: Sequence<T>; needle: T; equivalent: Equivalence<T>'
    level: declared
    source: implementation:search.linear.rust.slice.v1
  output:
    value: 'result: Option<Index<input.sequence>>'
    level: declared
    source: implementation:search.linear.rust.slice.v1
  ensures:
    value:
    - result is the first position equivalent to needle when one exists
    - result is none when no position is equivalent to needle
    level: tested
    source: tests:linear_search::returns_the_first_matching_position;linear_search::returns_none_when_no_element_matches
- id: sequence.minimum
  input:
    value: 'sequence: Sequence<T>; order: TotalOrder<T>'
    level: declared
    source: implementation:select.minimum.linear.rust.slice.v1
  output:
    value: 'result: Option<ElementOf<input.sequence>>'
    level: declared
    source: implementation:select.minimum.linear.rust.slice.v1
  ensures:
    value:
    - result is none if and only if input.sequence is empty
    - result is the first element no greater than any input element
    level: tested
    source: tests:minimum::returns_the_minimum_element;minimum::returns_the_first_equivalent_minimum;minimum::handles_empty_and_single_element_slices
- id: sequence.maximum
  input:
    value: 'sequence: Sequence<T>; order: TotalOrder<T>'
    level: declared
    source: implementation:select.maximum.linear.rust.slice.v1
  output:
    value: 'result: Option<ElementOf<input.sequence>>'
    level: declared
    source: implementation:select.maximum.linear.rust.slice.v1
  ensures:
    value:
    - result is none if and only if input.sequence is empty
    - result is the first element no less than any input element
    level: tested
    source: tests:maximum::returns_the_maximum_element;maximum::returns_the_first_equivalent_maximum;maximum::handles_empty_and_single_element_slices
- id: sequence.filter
  input:
    value: 'sequence: Sequence<T>; predicate: Predicate<T>'
    level: declared
    source: implementations:filter.copy.rust.vec.v1;filter.copy_into.rust.vec.v1;filter.in_place.rust.vec.v1
  output:
    value: 'result: StableSubsequence<input.sequence>'
    level: declared
    source: implementations:filter.copy.rust.vec.v1;filter.copy_into.rust.vec.v1;filter.in_place.rust.vec.v1
  ensures:
    value:
    - result contains exactly the input elements satisfying predicate
    - result preserves relative input order
    level: tested
    source: tests:filter::copy_preserves_matching_order;filter::in_place_compaction_preserves_matching_order
- id: sequence.partition
  input:
    value: 'sequence: Sequence<T>; predicate: Predicate<T>'
    level: declared
    source: implementations:partition.copy.rust.vec.v1;partition.copy_into.rust.vec.v1;partition.in_place.rust.slice.v1
  output:
    value: 'result: PartitionOf<input.sequence>'
    level: declared
    source: implementations:partition.copy.rust.vec.v1;partition.copy_into.rust.vec.v1;partition.in_place.rust.slice.v1
  ensures:
    value:
    - the matching partition contains exactly elements satisfying predicate
    - the rejected partition contains exactly elements not satisfying predicate
    - both partitions together are a permutation of input.sequence
    level: tested
    source: tests:partition::copy_preserves_order_in_both_partitions;partition::in_place_returns_a_valid_boundary_and_permutation
- id: sequence.reverse
  input:
    value: 'sequence: Sequence<T>'
    level: declared
    source: implementation:reverse.symmetric.rust.slice.v1
  output:
    value: 'result: ReverseOf<input.sequence>'
    level: declared
    source: implementation:reverse.symmetric.rust.slice.v1
  ensures:
    value:
    - result[i] equals input.sequence[n - 1 - i]
    - reversing result restores input.sequence
    level: tested
    source: tests:reverse::reverses_element_order;reverse::applying_twice_restores_the_input
- id: sequence.merge_sorted
  input:
    value: 'left: Sequence<T>; right: Sequence<T>; order: TotalOrder<T>'
    level: declared
    source: implementations:merge.sorted.rust.vec.v1;merge.sorted_into.rust.vec.v1
  requires:
    value:
    - input.left is sorted according to input.order
    - input.right is sorted according to input.order
    level: declared
    source: definition:sequence.merge_sorted
  output:
    value: 'result: Sequence<T>'
    level: declared
    source: implementations:merge.sorted.rust.vec.v1;merge.sorted_into.rust.vec.v1
  ensures:
    value:
    - result is sorted according to input.order
    - result is a permutation of the concatenation of input.left and input.right
    level: tested
    source: test:merge_sorted::merges_in_sorted_order_and_preserves_elements
- id: sequence.is_sorted
  input:
    value: 'sequence: Sequence<T>; order: TotalOrder<T>'
    level: declared
    source: implementation:order.is_sorted.rust.slice.v1
  output:
    value: 'result: bool'
    level: declared
    source: implementation:order.is_sorted.rust.slice.v1
  ensures:
    value:
    - result is true if and only if no adjacent pair is decreasing
    level: tested
    source: tests:is_sorted::accepts_sorted_values_and_duplicates;is_sorted::rejects_an_adjacent_inversion
- id: sequence.deduplicate
  input:
    value: 'sequence: Sequence<T>; equality: Equality<T>'
    level: declared
    source: implementations:deduplicate.quadratic.rust.vec.v1;deduplicate.hash.rust.vec.v1;deduplicate.hash_into.rust.vec.v1
  output:
    value: 'result: StableUniqueSequence<T>'
    level: declared
    source: implementations:deduplicate.quadratic.rust.vec.v1;deduplicate.hash.rust.vec.v1;deduplicate.hash_into.rust.vec.v1
  ensures:
    value:
    - result contains exactly one representative of each input equivalence class
    - result retains the first input occurrence and relative order
    level: tested
    source: tests:deduplicate::quadratic_preserves_first_occurrences;deduplicate::hash_preserves_first_occurrences
- id: graph.reachable_traversal
  input:
    value: 'graph: FiniteGraph<Node>; source: Node; neighbor_order: IterationOrder<Node>'
    level: declared
    source: docs:phase2/imports/importer-a/bfs.md;phase2/imports/importer-b/bfs.md
  requires:
    value:
    - input.source is a valid node in input.graph
    - the graph node set and adjacency relation remain stable during traversal
    level: declared
    source: docs:phase2/imports/importer-a/bfs.md;phase2/imports/importer-b/bfs.md
  output:
    value: 'result: IncrementalTraversal<Node>'
    level: declared
    source: docs:phase2/imports/importer-a/bfs.md;phase2/imports/importer-b/bfs.md
  ensures:
    value:
    - every yielded node is reachable from input.source
    - each reachable node is yielded exactly once
    - no node outside the reachable component is yielded
    level: declared
    source: docs:phase2/imports/importer-a/bfs.md;phase2/imports/importer-b/bfs.md
- id: graph.unweighted_shortest_paths
  input:
    value: 'graph: FiniteUndirectedGraph<Node>; sources: NonEmptySet<Node>; neighbor_order: IterationOrder<Node>'
    level: declared
    source: docs:phase2/imports/importer-a/bfs.md;phase2/imports/importer-b/bfs.md
  requires:
    value:
    - every input source is a valid node in input.graph
    level: declared
    source: docs:phase2/imports/importer-a/bfs.md;phase2/imports/importer-b/bfs.md
  output:
    value: 'result: PerNode<Reachability, MinimumEdgeCount, Optional<Path<Node>>>'
    level: declared
    source: docs:phase2/imports/importer-a/bfs.md;phase2/imports/importer-b/bfs.md
  ensures:
    value:
    - reachable nodes have their minimum edge count from any input source
    - each returned path joins an input source to its node and has the stated edge count
    - unreachable nodes are identified without a path
    level: declared
    source: docs:phase2/imports/importer-a/bfs.md;phase2/imports/importer-b/bfs.md
- id: graph.nonnegative_shortest_distances
  input:
    value: 'graph: FiniteWeightedGraph<Node, Cost>; source: Node; edge_cost: Edge -> Cost'
    level: declared
    source: docs:phase2/imports/importer-a/dijkstra.md;phase2/imports/importer-b/dijkstra.md
  requires:
    value:
    - input.source is a valid node in input.graph
    - every edge cost is nonnegative
    - cost addition and ordering preserve shortest-path comparisons
    level: declared
    source: docs:phase2/imports/importer-a/dijkstra.md;phase2/imports/importer-b/dijkstra.md
  output:
    value: 'result: Map<ReachableNode, MinimumPathCost>'
    level: declared
    source: docs:phase2/imports/importer-a/dijkstra.md;phase2/imports/importer-b/dijkstra.md
  ensures:
    value:
    - result maps every node reachable from input.source to its minimum path cost
    - input.source maps to zero
    - unreachable nodes are absent
    level: declared
    source: docs:phase2/imports/importer-a/dijkstra.md;phase2/imports/importer-b/dijkstra.md
- id: graph.nonnegative_shortest_path_tree
  input:
    value: 'graph: FiniteDirectedGraph<Node, NonNegativeFiniteF64>; source: Node'
    level: declared
    source: docs:phase2/imports/importer-a/dijkstra.md;phase2/imports/importer-b/dijkstra.md
  requires:
    value:
    - input.source is a valid node in input.graph
    - all path-cost arithmetic is free from comparison-changing rounding and overflow
    level: declared
    source: docs:phase2/imports/importer-a/dijkstra.md;phase2/imports/importer-b/dijkstra.md
  output:
    value: 'result: PerNode<Reachability, MinimumPathCost, Optional<DirectedPath>>'
    level: declared
    source: docs:phase2/imports/importer-a/dijkstra.md;phase2/imports/importer-b/dijkstra.md
  ensures:
    value:
    - each reachable node has its minimum path cost from input.source
    - each reachable node has a reconstructible path with the stated cost
    - unreachable nodes have infinite distance and no path
    level: declared
    source: docs:phase2/imports/importer-a/dijkstra.md;phase2/imports/importer-b/dijkstra.md
- id: disjoint_set.construct
  input:
    value: 'element_count: usize'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'state: DisjointPartition<ElementId>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - state contains exactly element_count consecutively indexed singleton classes
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: disjoint_set.union
  input:
    value: 'state: DisjointPartition<ElementId>; left: ElementId; right: ElementId'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  requires:
    value:
    - left and right identify elements owned by state
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'state_after: DisjointPartition<ElementId>; merged: bool'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - state_after merges exactly the two prior classes when they were distinct
    - merged is true if and only if two distinct classes were merged
    - all other class memberships are preserved
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: disjoint_set.equivalent
  input:
    value: 'state: DisjointPartition<ElementId>; left: ElementId; right: ElementId'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  requires:
    value:
    - left and right identify elements owned by state
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'result: bool; state_after: SemanticallyEquivalent<input.state>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - result is true if and only if left and right belong to the same class
    - representation-only path rewrites do not change partition membership
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: priority_queue.construct
  input:
    value: 'storage: OwnedSequence<T>; order: TotalOrder<T>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'state: MaxPriorityQueue<T>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - state contains exactly the input elements
    - subsequent maximum queries observe a greatest remaining element
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: priority_queue.push
  input:
    value: 'state: MaxPriorityQueue<T>; item: T'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'state_after: MaxPriorityQueue<T>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - state_after contains item and every element previously in state
    - the max-heap invariant is restored
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: priority_queue.pop_max
  input:
    value: 'state: MaxPriorityQueue<T>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'state_after: MaxPriorityQueue<T>; result: Option<T>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - result is none if and only if state was empty
    - otherwise result is a greatest prior element and exactly one occurrence is removed
    - the max-heap invariant is restored
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: priority_queue.peek_max
  input:
    value: 'state: MaxPriorityQueue<T>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'result: Option<Borrowed<T>>; state_after: Identical<input.state>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - result is none if and only if state is empty
    - otherwise result borrows a greatest element without changing state
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: associative_map.construct
  input:
    value: 'capacity: usize; hasher: BuildHasher'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'state: AssociativeMap<K, V>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - state is empty and can hold at least capacity entries without reallocating
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: associative_map.insert
  input:
    value: 'state: AssociativeMap<K, V>; key: K; value: V'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  requires:
    value:
    - equal keys produce equal hashes
    - stored keys retain stable equality and hash behavior
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'state_after: AssociativeMap<K, V>; replaced: Option<V>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - state_after maps key to value even when distinct keys collide
    - replaced contains the prior value if the key was already present
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: associative_map.lookup
  input:
    value: 'state: AssociativeMap<K, V>; key: BorrowedKey<K>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  requires:
    value:
    - borrowed and stored key forms have compatible equality and hash behavior
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'result: Option<Borrowed<V>>; state_after: Identical<input.state>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - result borrows the mapped value exactly when an equivalent key is present
    - collisions with unequal keys do not change the result
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: associative_map.remove
  input:
    value: 'state: AssociativeMap<K, V>; key: BorrowedKey<K>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  requires:
    value:
    - borrowed and stored key forms have compatible equality and hash behavior
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  output:
    value: 'state_after: AssociativeMap<K, V>; result: Option<V>'
    level: declared
    source: docs:phase2/k-m2-dynamic-structures.md
  ensures:
    value:
    - result contains and removes the prior mapped value exactly when the key was present
    - allocated capacity remains available for reuse
    - colliding unequal keys and values remain present
    level: tested
    source: file:crates/atlas/tests/external_dynamic_structure_adapters.rs
- id: stream.top_k
  input:
    value: 'stream: FiniteStream<T>; capacity: usize; order: TotalOrder<T>'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  output:
    value: 'result: Sequence<T>'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  ensures:
    value:
    - result contains exactly min(capacity, stream length) input occurrences
    - no omitted occurrence is greater than a retained occurrence
    - capacity zero produces an empty result
    level: tested
    source: file:crates/atlas/tests/external_streaming_adapters.rs
- id: stream.population_moments
  input:
    value: 'stream: FiniteStream<FiniteF64>'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  requires:
    value:
    - stream length is representable by the implementation count and its floating conversion
    - intermediate deltas, products and sums remain finite
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  output:
    value: 'count: u64; mean: f64; population_variance: Option<f64>'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  ensures:
    value:
    - count equals the number of consumed values
    - population_variance is none exactly for an empty stream
    - over exact real arithmetic, mean and population_variance equal the corresponding stream moments
    level: declared
    source: docs:https://doi.org/10.1080/00401706.1962.10490022
- id: stream.uniform_sample_without_replacement
  input:
    value: 'stream: FiniteStream<T>; capacity: usize; random_source: UniformIndependentDraws'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  requires:
    value:
    - each requested random integer is uniform over its stated range and independent of prior draws
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  output:
    value: 'result: Sequence<T>'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  ensures:
    value:
    - result contains min(capacity, stream length) distinct input positions
    - each input position has equal probability of appearing in result
    - a fixed random draw sequence produces a fixed result
    level: declared
    source: docs:https://dl.acm.org/doi/10.1145/3147.3165
- id: approximate_membership.construct
  input:
    value: 'bit_count: PositiveUsize; hash_count: PositiveU32; hashes: HashFamily<T>'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  output:
    value: 'state: ApproximateMembershipFilter<T>'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  ensures:
    value:
    - state contains exactly bit_count cleared bits and retains hash_count and hashes
    level: tested
    source: file:crates/atlas/tests/external_streaming_adapters.rs
- id: approximate_membership.insert
  input:
    value: 'state: ApproximateMembershipFilter<T>; item: T'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  requires:
    value:
    - the configured hashes are deterministic and return valid bit positions
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  output:
    value: 'state_after: ApproximateMembershipFilter<T>'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  ensures:
    value:
    - every bit selected for item is set
    - no previously set bit is cleared
    level: tested
    source: file:crates/atlas/tests/external_streaming_adapters.rs
- id: approximate_membership.query
  input:
    value: 'state: ApproximateMembershipFilter<T>; item: T; inserted_count: usize'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  requires:
    value:
    - the same hash family is used for insertion and query
    - the false-positive estimate assumes independent uniform hash positions
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  output:
    value: 'result: DefinitelyAbsent | PossiblyPresent; state_after: Identical<input.state>'
    level: declared
    source: docs:phase2/k-m3-streaming-approximation.md
  ensures:
    value:
    - an inserted item is never reported DefinitelyAbsent
    - PossiblyPresent may be a false positive but never claims exact membership
    - under the stated hash model, the false-positive probability is approximately (1 - exp(-hash_count * inserted_count / bit_count))^hash_count
    level: declared
    source: docs:https://dl.acm.org/doi/10.1145/362686.362692
- id: sequence.run_length_encode
  input:
    value: 'input: Sequence<T>; equivalent: Equivalence<T>'
    level: declared
    source: docs:phase-demo.md
  output:
    value: 'runs: Sequence<(T, PositiveCount)>'
    level: declared
    source: docs:phase-demo.md
  ensures:
    value:
    - expanding runs reconstructs input exactly
    - adjacent output runs have non-equivalent symbols
    - empty input produces no runs
    level: tested
    source: file:crates/atlas-web-wasm/src/rle.rs
- id: graph.nonnegative_shortest_path
  input:
    value: 'graph: FiniteGraph<Node, NonNegativeCost>; source: Node; goal: Node'
    level: declared
    source: docs:phase-demo.md
  requires:
    value:
    - source and goal are valid nodes in graph
    - cost addition and ordering preserve shortest-path comparisons
    level: declared
    source: docs:phase-demo.md
  output:
    value: 'result: Option<(MinimumPathCost, Path<source, goal>)>'
    level: declared
    source: docs:phase-demo.md
  ensures:
    value:
    - a returned path joins source to goal and has minimum total cost
    - none is returned exactly when goal is unreachable from source
    level: tested
    source: file:crates/atlas-web-wasm/src/astar.rs
algorithms:
- id: sort.merge.top_down
  solves: sequence.sort
  name:
    value: top-down merge sort
    level: declared
    source: vision:0.1#6
  stable:
    value: true
    level: tested
    source: test:merge_sort::is_stable
  deterministic:
    value: true
    level: declared
    source: implementation:sort.merge.rust.slice.v1
  in_place:
    value: false
    level: declared
    source: implementation:sort.merge.rust.slice.v1
  costs:
  - source: vision:0.1#6
    level: declared
    value:
      metric: time
      regime: worst
      bound: O(n log n)
      requires: []
  - source: implementation:sort.merge.rust.slice.v1
    level: declared
    value:
      metric: auxiliary_memory
      regime: worst
      bound: O(n)
      requires: []
- id: sort.insertion
  solves: sequence.sort
  name:
    value: insertion sort
    level: declared
    source: implementation:sort.insertion.rust.slice.v1
  stable:
    value: true
    level: tested
    source: test:insertion_sort::is_stable
  deterministic:
    value: true
    level: declared
    source: implementation:sort.insertion.rust.slice.v1
  in_place:
    value: true
    level: declared
    source: implementation:sort.insertion.rust.slice.v1
  costs:
  - source: implementation:sort.insertion.rust.slice.v1
    level: declared
    value:
      metric: time
      regime: worst
      bound: O(n^2)
