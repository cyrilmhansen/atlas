      - atom: output.reachable_component
        evidence: { level: tested, source: "file:crates/atlas/tests/external_graph_adapters.rs", proof: null }
    requires: []
    guarantees:
      - atom: guarantee.exact_component_once
        evidence: { level: tested, source: "file:crates/atlas/tests/external_graph_adapters.rs", proof: null }
    effects:
      - atom: effect.allocates_traversal_state
        evidence: { level: declared, source: "registry:graph.bfs.petgraph.0_8_3", proof: null }
    consumes_state: null
    produces_state: null
    costs:
      - operation: traverse
        metric: retained_memory
        regime: worst
        bound: "O(V)"
        requires: []
        evidence: { level: inferred, source: "analysis:phase2/k-m1-graph-corpus", proof: null }

  - id: candidate.graph.dfs
    source: registry:graph.dfs.petgraph.0_8_3
    provides:
