relations: []

requests:
  - id: request.reach.exact_component
    accepts: output.reachable_component
    provides_conditions: []
    requires_guarantees: [guarantee.exact_component_once]
    forbids_effects: []
    consumes_state: null
    maximum_costs: []
    accepted_evidence: [declared, inferred, tested, observed, proven]

  - id: request.reach.no_allocation
    accepts: output.reachable_component
    provides_conditions: []
    requires_guarantees: [guarantee.exact_component_once]
    forbids_effects: [effect.allocates_traversal_state]
    consumes_state: null
    maximum_costs: []
    accepted_evidence: [declared, inferred, tested, observed, proven]

  - id: request.reach.frontier_for_known_shape
    accepts: output.reachable_component
    provides_conditions: [condition.known_graph_shape]
    requires_guarantees: [guarantee.exact_component_once]
    forbids_effects: []
    consumes_state: null
    maximum_costs:
      - operation: traverse
        metric: retained_memory
        regime: worst
        bound: "O(shape-dependent frontier)"
        requires: [condition.known_graph_shape]
    accepted_evidence: [declared, inferred, tested, observed, proven]

  - id: request.reach.non_decreasing_hops
    accepts: output.reachable_component
