name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Acceptance and MIR probe
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source and MIR
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Apply vendored MIR patches
        run: ./scripts/apply-mir-patches.sh

      - name: Install RV64 LP64 probe tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-riscv64-linux-gnu qemu-user

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Run MVP 2 acceptance gate
        run: ./scripts/check-mvp2.sh

      - name: Test all workspace targets
        run: cargo test --workspace --all-targets --locked --offline

      - name: Run RV64 LP64 ABI probe
        run: ./scripts/check-rv64-lp64-abi.sh

      - name: Run MIR RV64 generator probe
        run: ./scripts/check-mir-rv64-generator.sh
