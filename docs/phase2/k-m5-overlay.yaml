relations:
  - from: output.path_tree.all_reachable
    to: output.distances.all_reachable
    kind: projects_to
    requires: [condition.nonnegative_weights]
    evidence: { level: declared, source: "docs:phase2/k-m0-comparison", proof: null }
  - from: output.heavy_hitters.exact
    to: output.heavy_hitters.candidates
    kind: refines
    requires: [condition.replayable_input]
    evidence: { level: declared, source: "docs:phase2/k-m4-dual-import-comparison", proof: null }
  - from: output.bloom_membership
    to: output.bloom_definitive_negative
    kind: projects_to
    requires: [condition.declared_hash_model, condition.negative_result]
    evidence: { level: declared, source: "docs:phase2/k-m4-dual-import-comparison", proof: null }
  - from: state.moments.count_mean_m2
    to: output.unbiased_variance
    kind: finalizes
    requires: [condition.count_gt_1]
    evidence: { level: declared, source: "docs:phase2/k-m4-w-comparison", proof: null }

