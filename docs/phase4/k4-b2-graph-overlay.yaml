        evidence: { level: tested, source: "file:crates/atlas/tests/external_graph_adapters.rs", proof: null }
    requires: []
    guarantees:
      - atom: guarantee.exact_component_once
        evidence: { level: tested, source: "file:crates/atlas/tests/external_graph_adapters.rs", proof: null }
    effects:
